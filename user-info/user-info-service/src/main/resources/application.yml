server:
  port: 8080
spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos.address}
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/spring_cloud_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${mysql.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: ${redis.address}
      timeout: 60s #连接空闲超过N(s秒、ms毫秒)后关闭，0为禁用，这里配置值和tcp-keepalive值一致
      lettuce:
        pool:
          max-active: 8  #允许最大连接数
          max-idle: 8 #最大空闲连接数, 默认8
          min-idle: 0  #最小空闲连接数
          max-wait: 5s  #请求获取连接等待时间
  rabbitmq:
    addresses: ${rabbitmq.address}
    listener:
      simple:
        acknowledge-mode: manual   #手动确认
  mail:
    host: smtp.qq.com
    username: 1771469353@qq.com   # 登录账户
    password: ikkhremtumcqidae  # 登录密码/授权码
    properties:
      personal: "博客社区"
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  file:
    name: user.log
