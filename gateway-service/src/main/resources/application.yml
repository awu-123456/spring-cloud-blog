server:
  port: 10030
spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 101.43.87.239:10020
    gateway:
      routes: #⽹关路由配置
        - id: user-service #路由ID, ⾃定义, 唯⼀即可
          uri: lb://user-service #⽬标服务地址
          predicates: #路由条件
            - Path=/user/**
        - id: blog-service
          uri: lb://blog-service
          predicates:
            - Path=/blog/**